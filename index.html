<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameDev Pulse — 游戏开发灵感站</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a28;
    --bg-card-hover: #222236;
    --border: #2a2a3e;
    --text-primary: #e8e8f0;
    --text-secondary: #9898b0;
    --text-muted: #5e5e78;
    --accent-new: #ff4d6a;
    --accent-design: #7b61ff;
    --accent-industry: #00c9a7;
    --accent-art: #ffb347;
    --gradient-new: linear-gradient(135deg, #ff4d6a, #ff2d5e);
    --gradient-design: linear-gradient(135deg, #7b61ff, #5a3fff);
    --gradient-industry: linear-gradient(135deg, #00c9a7, #00a88a);
    --gradient-art: linear-gradient(135deg, #ffb347, #ff9500);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--gradient-design);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo span { color: var(--accent-design); }

  .search-bar {
    flex: 0 1 400px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
  }

  .search-bar input:focus {
    border-color: var(--accent-design);
    box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.15);
  }

  .search-bar input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .header-date {
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
  }

  /* Tabs */
  .tabs-container {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .tabs-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
    padding: 12px 0;
    overflow-x: auto;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    font-family: inherit;
  }

  .tab-btn:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .tab-btn.active[data-tab="new"] { background: rgba(255, 77, 106, 0.15); color: var(--accent-new); }
  .tab-btn.active[data-tab="design"] { background: rgba(123, 97, 255, 0.15); color: var(--accent-design); }
  .tab-btn.active[data-tab="industry"] { background: rgba(0, 201, 167, 0.15); color: var(--accent-industry); }
  .tab-btn.active[data-tab="art"] { background: rgba(255, 179, 71, 0.15); color: var(--accent-art); }

  .tab-count {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    font-weight: 600;
  }

  .tab-btn.active[data-tab="new"] .tab-count { background: rgba(255, 77, 106, 0.25); }
  .tab-btn.active[data-tab="design"] .tab-count { background: rgba(123, 97, 255, 0.25); }
  .tab-btn.active[data-tab="industry"] .tab-count { background: rgba(0, 201, 167, 0.25); }
  .tab-btn.active[data-tab="art"] .tab-count { background: rgba(255, 179, 71, 0.25); }

  /* Main content */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Feed */
  .feed { display: flex; flex-direction: column; gap: 16px; }

  .feed-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .feed-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }

  .feed-card[data-type="new"]::before { background: var(--gradient-new); }
  .feed-card[data-type="design"]::before { background: var(--gradient-design); }
  .feed-card[data-type="industry"]::before { background: var(--gradient-industry); }
  .feed-card[data-type="art"]::before { background: var(--gradient-art); }

  .feed-card:hover {
    background: var(--bg-card-hover);
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .feed-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .feed-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .feed-tag.new { background: rgba(255, 77, 106, 0.15); color: var(--accent-new); }
  .feed-tag.design { background: rgba(123, 97, 255, 0.15); color: var(--accent-design); }
  .feed-tag.industry { background: rgba(0, 201, 167, 0.15); color: var(--accent-industry); }
  .feed-tag.art { background: rgba(255, 179, 71, 0.15); color: var(--accent-art); }

  .feed-source {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .feed-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }

  .feed-desc {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  .feed-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .feed-meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .feed-highlights {
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .feed-highlights-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .feed-highlights ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .feed-highlights li {
    font-size: 13px;
    padding: 4px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: var(--text-secondary);
  }

  /* Featured card (larger) */
  .feed-card.featured {
    padding: 32px;
  }

  .feed-card.featured .feed-title {
    font-size: 24px;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }

  .stat-number {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .stat-number.new { color: var(--accent-new); }
  .stat-number.design { color: var(--accent-design); }
  .stat-number.industry { color: var(--accent-industry); }
  .stat-number.art { color: var(--accent-art); }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 500;
  }

  /* Release calendar */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .cal-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.3s;
  }

  .cal-item:hover {
    border-color: var(--accent-new);
    transform: translateY(-1px);
  }

  .cal-date {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-new);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .cal-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .cal-platform {
    font-size: 11px;
    color: var(--text-muted);
  }

  .cal-hot {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255, 77, 106, 0.2);
    color: var(--accent-new);
    font-weight: 700;
    margin-left: 6px;
  }

  /* Guestbook section */
  .guestbook {
    max-width: 1400px;
    margin: 40px auto 0;
    padding: 0 24px 60px;
  }

  .guestbook-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .guestbook-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }

  .guestbook-intro {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .guestbook-intro strong {
    color: var(--accent-design);
  }

  /* Giscus overrides for dark theme */
  .giscus {
    max-width: 100%;
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
    max-width: 1400px;
    margin: 0 auto;
  }

  .footer a { color: var(--accent-design); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 768px) {
    .header-inner { gap: 12px; }
    .search-bar { flex: 1; }
    .header-date { display: none; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .feed-card.featured .feed-title { font-size: 20px; }
    .feed-title { font-size: 16px; }
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feed-card { animation: fadeInUp 0.4s ease-out both; }
  .feed-card:nth-child(1) { animation-delay: 0.05s; }
  .feed-card:nth-child(2) { animation-delay: 0.1s; }
  .feed-card:nth-child(3) { animation-delay: 0.15s; }
  .feed-card:nth-child(4) { animation-delay: 0.2s; }
  .feed-card:nth-child(5) { animation-delay: 0.25s; }
  .feed-card:nth-child(6) { animation-delay: 0.3s; }
  .feed-card:nth-child(7) { animation-delay: 0.35s; }
  .feed-card:nth-child(8) { animation-delay: 0.4s; }
</style>
</head>

// ============ RENDER ============

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = calendarData.map(item => `
    <div class="cal-item">
      <div class="cal-date">${item.date}</div>
      <div class="cal-title">${item.title}${item.hot ? '<span class="cal-hot">HOT</span>' : ''}</div>
      <div class="cal-platform">${item.platform}</div>
    </div>
  `).join('');
}

function renderFeed() {
  const container = document.getElementById('feedContainer');
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  const filtered = feedData.filter(item => {
    const matchSearch = !searchTerm || 
      item.title.toLowerCase().includes(searchTerm) || 
      item.desc.toLowerCase().includes(searchTerm) ||
      (item.highlights && item.highlights.some(h => h.toLowerCase().includes(searchTerm)));
    return matchSearch;
  });

  container.innerHTML = filtered.map((item, i) => `
    <div class="feed-card ${item.featured ? 'featured' : ''}" data-type="${item.type}" onclick="window.open('${item.link}', '_blank')">
      <div class="feed-card-header">
        <span class="feed-tag ${item.type}">${item.tag}</span>
        <span class="feed-source">${item.source} · ${item.date}</span>
      </div>
      <div class="feed-title">${item.title}</div>
      <div class="feed-desc">${item.desc}</div>
      ${item.highlights ? `
        <div class="feed-highlights">
          <div class="feed-highlights-title">关键标签</div>
          <ul>${item.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
        </div>
      ` : ''}
    </div>
  `).join('');
}

function updateCounts() {
  const newCount = feedData.filter(d => d.type === 'new').length;
  const designCount = feedData.filter(d => d.type === 'design').length;
  const industryCount = feedData.filter(d => d.type === 'industry').length;
  const artCount = feedData.filter(d => d.type === 'art').length;

  document.getElementById('countAll').textContent = feedData.length;
  document.getElementById('countNew').textContent = newCount;
  document.getElementById('countDesign').textContent = designCount;
  document.getElementById('countIndustry').textContent = industryCount;
  document.getElementById('countArt').textContent = artCount;

  document.getElementById('statNew').textContent = newCount;
  document.getElementById('statDesign').textContent = designCount;
  document.getElementById('statIndustry').textContent = industryCount;
  document.getElementById('statArt').textContent = artCount;
}

// ============ INTERACTION ============

let currentTab = 'all';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });

  const cards = document.querySelectorAll('.feed-card');
  cards.forEach(card => {
    if (tab === 'all' || card.dataset.type === tab) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });

  // Also toggle calendar section visibility
  const calSection = document.getElementById('calendarSection');
  if (tab === 'all' || tab === 'new') {
    calSection.classList.remove('hidden');
  } else {
    calSection.classList.add('hidden');
  }
}

function filterCards() {
  renderFeed();
  switchTab(currentTab);
}

// ============ INIT ============

function init() {
  const now = new Date();
  document.getElementById('currentDate').textContent = 
    now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  renderCalendar();
  renderFeed();
  updateCounts();
}

init();
</script>
